services:
  # 1. FastAPI Backend Docker Service
  - type: web
    name: nexus-ai-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: MONGO_URI
        value: mongodb://localhost:27017 # Local mock mongo is used, but required placeholder
      - key: MONGO_DB_NAME
        value: inventory_db
      - key: SECRET_KEY
        value: nexus_ai_inventory_secret_key_prod_2026
      - key: ALGORITHM
        value: HS256
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false # User enters this securely in the Render Dashboard

  # 2. React Vite Frontend Static Site
  - type: web
    name: nexus-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
