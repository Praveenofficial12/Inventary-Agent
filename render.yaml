services:
  # Single Docker service: Serves BOTH FastAPI backend and React frontend
  - type: web
    name: nexus-ai-inventory
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: MONGO_URI
        value: mongodb://localhost:27017
      - key: MONGO_DB_NAME
        value: inventory_db
      - key: SECRET_KEY
        value: nexus_ai_inventory_secret_key_prod_2026
      - key: ALGORITHM
        value: HS256
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false   # Set this securely in the Render Dashboard env vars
      - key: CORS_ORIGINS
        value: "*"
